<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

  <!-- Breadcrumb -->
  <p class="breadcrumb">Main > Latest job > C# Developer</p>

  <!-- Header -->
  <div class="header">
    <h1>Details</h1>
    <div class="buttons">
      <button class="cancel">CANCEL</button>
      <button class="save">SAVE</button>
    </div>
  </div>

  <hr />

  <!-- Form -->
  <form class="form">

    <div class="row">
      <input type="text" placeholder="First name">
      <input type="text" placeholder="Last name">
    </div>

    <div class="row">
      <input type="email" placeholder="Email">
      <input type="text" placeholder="Phone number">
    </div>

    <input type="text" class="full" placeholder="Location">

    <textarea placeholder="Address"></textarea>

  </form>

</div>

</body>
</html>
